<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Panel Admin</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    body {
      background-color: #1a1a1a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-card {
      background: #2b2b2b;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 400px;
    }
    h2 {
      margin-top: 0;
      text-align: center;
      color: #4CAF50;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
    }
    input[type="text"], input[type="password"], input[type="file"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #444;
      border-radius: 5px;
      background: #333;
      color: #fff;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background-color: #4CAF50;
      color: white;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background-color: #45a049;
    }
    .error {
      color: #ff4d4d;
      margin-bottom: 15px;
      text-align: center;
      display: none;
    }
    /* Style du Panel Admin (caché par défaut) */
    #admin-panel {
      display: none;
      width: 100%;
      max-width: 600px;
    }
  </style>
</head>
<body>

  <!-- 1. PAGE DE CONNEXION -->
  <div class="login-card" id="login-box">
    <h2>Connexion Admin</h2>
    <div class="error" id="error-msg">Identifiant ou mot de passe incorrect !</div>
    
    <div class="form-group">
      <label>Identifiant</label>
      <input type="text" id="username" placeholder="Entrez votre identifiant">
    </div>
    
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="Entrez votre mot de passe">
    </div>
    
    <button onclick="seConnecter()">Se connecter</button>
  </div>

  <!-- 2. PANNEAU ADMIN (Accessible uniquement après connexion) -->
  <div class="login-card" id="admin-panel">
    <h2>Panel Admin - Bienvenue !</h2>
    <p>Vous êtes connecté avec accès exclusif.</p>
    <hr style="border-color: #444; margin: 20px 0;">
    
    <h3>Ajouter une image locale</h3>
    <div class="form-group">
      <label>Sélectionner une image depuis votre ordinateur :</label>
      <input type="file" id="image-file" accept="image/*" onchange="apercuImage(event)">
    </div>

    <!-- Aperçu de l'image locale -->
    <div id="preview-container" style="margin-top: 15px; text-align: center;">
      <img id="preview" src="" alt="Aperçu" style="max-width: 100%; display: none; border-radius: 5px;">
    </div>
    
    <button onclick="seDeconnecter()" style="background-color: #d32f2f; margin-top: 20px;">Déconnexion</button>
  </div>

  <script>
    // Vos identifiants de sécurité
    const USER_CORRECT = "BrestBrestStaff";
    const PASS_CORRECT = "StaffRP1234";

    function seConnecter() {
      const userSaisi = document.getElementById('username').value;
      const passSaisi = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');

      if (userSaisi === USER_CORRECT && passSaisi === PASS_CORRECT) {
        // Cacher la boîte de login et afficher le Panel Admin
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        errorMsg.style.display = 'none';
      } else {
        // Afficher l'erreur
        errorMsg.style.display = 'block';
      }
    }

    // Fonction pour afficher l'image choisie depuis vos fichiers locaux
    function apercuImage(event) {
      const input = event.target;
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = document.getElementById('preview');
          img.src = e.target.result;
          img.style.display = 'block';
        }
        reader.readAsDataURL(input.files[0]);
      }
    }

    function seDeconnecter() {
      document.getElementById('login-box').style.display = 'block';
      document.getElementById('admin-panel').style.display = 'none';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
    }
  </script>

</body>
</html>
